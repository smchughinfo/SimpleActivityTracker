name: Deploy SAT

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/smchughinfo/vibes-sat:latest

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        run: |
          az containerapp registry set \
            --name vibes-sat \
            --resource-group seanmchugh-hub \
            --server ghcr.io \
            --username smchughinfo \
            --password ${{ secrets.GHCR_PAT }}
          az containerapp update \
            --name vibes-sat \
            --resource-group seanmchugh-hub \
            --image ghcr.io/smchughinfo/vibes-sat:latest
